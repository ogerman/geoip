name: Build geoip
on:
  workflow_dispatch:
  schedule:
    - cron: '10 3 * * *'
  push:
    branches:
      - test
      - master
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "LICENSE"
      - "release/**"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      CURL: "curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused"
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout v2fly/geoip
        uses: actions/checkout@v6
        with:
          repository: v2fly/geoip
          path: geoip
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: geoip/go.mod
          cache: true
          cache-dependency-path: geoip/go.sum


      - name: Overlay custom files over geoip
        run: |
          set -euo pipefail
          cp -f ./*.json geoip/ 2>/dev/null || true
          cp -f ./*.txt  geoip/ 2>/dev/null || true
          cp -f ./*.py   geoip/ 2>/dev/null || true

      - name: Set tag
        if: github.ref_name == 'master'
        run: |
          set -euo pipefail
          DAILY_TAG=$(date +%Y%m%d%H%M)
          echo "DAILY_TAG=$DAILY_TAG" >> "$GITHUB_ENV"

      - name: Create Tag
        if: github.ref_name == 'master'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { DAILY_TAG } = process.env
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${DAILY_TAG}`,
              sha: context.sha
            })

      - name: Download inputs (IP lists + Geobases)
        working-directory: geoip
        run: |
          set -euo pipefail
          ${{ env.CURL }} -o whitelist.txt https://raw.githubusercontent.com/escapingworm/russia-whitelist/refs/heads/main/ru-whitelist-cidr.txt
          ${{ env.CURL }} -o antifilterdownloadcommunity.txt https://community.antifilter.download/list/community.lst
          ${{ env.CURL }} -o refilter.txt https://raw.githubusercontent.com/1andrevich/Re-filter-lists/refs/heads/main/ipsum.lst
          ${{ env.CURL }} -o refiltercommunity.txt https://raw.githubusercontent.com/1andrevich/Re-filter-lists/refs/heads/main/community_ips.lst
          ${{ env.CURL }} -o antifilternetwork.txt https://antifilter.network/download/ip.lst
          ${{ env.CURL }} -o antifilternetworkcommunity.txt https://antifilter.network/downloads/custom.lst
          ${{ env.CURL }} -o cdn.lst https://raw.githubusercontent.com/mansourjabin/cdn-ip-database/refs/heads/main/data/cdn.lst
          ${{ env.CURL }} -o merged.sum https://raw.githubusercontent.com/PentiumB/CDN-RuleSet/refs/heads/main/release/merged.sum
          ${{ env.CURL }} -o geolite_ru.lst https://raw.githubusercontent.com/hydraponique/countrydb/refs/heads/main/output/geolite2-geo-whois-asn-country-ipv4/ru.lst
          ${{ env.CURL }} -o geolite_by.lst https://raw.githubusercontent.com/hydraponique/countrydb/refs/heads/main/output/geolite2-geo-whois-asn-country-ipv4/by.lst
          ${{ env.CURL }} -o ipinfo_ru.lst https://raw.githubusercontent.com/Davoyan/ipinfo/refs/heads/main/geo/geoip/ru.lst
          ${{ env.CURL }} -o ipinfo_by.lst https://raw.githubusercontent.com/Davoyan/ipinfo/refs/heads/main/geo/geoip/by.lst
          ${{ env.CURL }} -o dbip_ru.lst https://raw.githubusercontent.com/hydraponique/countrydb/refs/heads/main/output/dbip-country-ipv4/ru.lst
          ${{ env.CURL }} -o dbip_by.lst https://raw.githubusercontent.com/hydraponique/countrydb/refs/heads/main/output/dbip-country-ipv4/by.lst

      - name: Build geoip tool
        working-directory: geoip
        run: |
          set -euo pipefail
          go mod download
          go build -o geoip

      - name: Generate geoip artifacts
        working-directory: geoip
        run: |
          set -euo pipefail

          rm -rf tmp output
          mkdir -p tmp/text output/dat output/text

          rm -f ./tmp/text/prepare.txt
          : > ./tmp/text/prepare.txt
          for f in ./geolite_ru.lst ./geolite_by.lst ./ipinfo_ru.lst ./ipinfo_by.lst ./dbip_ru.lst ./dbip_by.lst ./CUSTOM-LIST-ADD.txt ./CUSTOM-WHITELIST.txt; do
            if [ -f "$f" ]; then
              cat "$f" >> ./tmp/text/prepare.txt
              printf '\n' >> ./tmp/text/prepare.txt
            fi
          done

          python3 ipset_ops.py --mode diff \
            --A ./tmp/text/prepare.txt \
            --B ./refilter.txt,./antifilternetwork.txt,./antifilterdownloadcommunity.txt,./refiltercommunity.txt,./antifilternetworkcommunity.txt,./cdn.lst,./merged.sum,./CUSTOM-LIST-DEL.txt \
            --out ./tmp/text/final.txt

          ./geoip -c config.json

          ls -l output/dat/*.dat

      - name: Install Mihomo (latest stable .deb)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download -R MetaCubeX/mihomo --pattern 'mihomo-linux-amd64*.deb' --dir /tmp
          sudo apt-get install -y "$(ls -1 /tmp/mihomo-linux-amd64*.deb | head -n1)"
          rm -f /tmp/mihomo-linux-amd64*.deb

      - name: Install sing-box
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ${{ env.CURL }} https://sing-box.app/install.sh | sudo -E sh -s -- --version 1.12.12

      - name: Prepare workdir (copy ALL text files + clean with awk)
        run: |
          set -euo pipefail

          work=/tmp/geoip-text
          rm -rf "$work"
          mkdir -p "$work"

          shopt -s nullglob
          cp -f geoip/output/text/*.txt "$work"/
          shopt -u nullglob

          for f in "$work"/*.txt; do
            tmp="$(mktemp)"
            awk '
              function trim(s){ sub(/^[ \t]+/,"",s); sub(/[ \t]+$/,"",s); return s }
              {
                gsub(/\r/,"")
                s=$0

                sub(/[ \t]*#.*/,  "", s)
                sub(/[ \t]*\/\/.*/, "", s)
                sub(/[ \t]*@.*/,  "", s)

                s=trim(s)
                if (s=="") next
                print s
              }
            ' "$f" > "$tmp"
            mv "$tmp" "$f"
          done

      - name: Build mihomo .mrs from workdir (multi-file)
        run: |
          set -euo pipefail

          src=/tmp/geoip-text
          out=/tmp/mihomo/rulesets
          rm -rf /tmp/mihomo
          mkdir -p "$out"

          shopt -s nullglob
          for f in "$src"/*.txt; do
            bn="$(basename "$f")"
            base="${bn%.txt}"
            dest="$out/${base}.mrs"
            mihomo convert-ruleset ipcidr text "$f" "$dest"
          done
          shopt -u nullglob

          ls -l "$out"/*.mrs

      - name: Build sing-box .srs from workdir (multi-file, no python/jq)
        run: |
          set -euo pipefail

          src=/tmp/geoip-text
          out=/tmp/sing-box/rulesets
          rm -rf /tmp/sing-box
          mkdir -p "$out"

          shopt -s nullglob
          for f in "$src"/*.txt; do
            bn="$(basename "$f")"
            base="${bn%.txt}"
            dest="$out/${base}.srs"

            tmp_json="$(mktemp)"

            if test -s "$f"; then
              awk '
                BEGIN { first=1; printf("{\"version\":3,\"rules\":[{\"ip_cidr\":[") }
                {
                  if (first==0) printf(",")
                  printf("\"%s\"", $0)
                  first=0
                }
                END { printf("]}]}") }
              ' "$f" > "$tmp_json"
            else
              printf '{"version":3,"rules":[]}' > "$tmp_json"
            fi

            sing-box rule-set compile --output "$dest" "$tmp_json"
            rm -f "$tmp_json"
          done
          shopt -u nullglob

          ls -l "$out"/*.srs

      - name: MASTER Prepare release directory and archives
        if: github.ref_name == 'master'
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release/text release/mihomo release/sing-box
          cp geoip/output/dat/*.dat release/
          cp -f /tmp/geoip-text/*.txt release/text/
          cp -a /tmp/mihomo/rulesets/.   release/mihomo/
          cp -a /tmp/sing-box/rulesets/. release/sing-box/
          rm -f /tmp/text.tar.gz /tmp/mihomo.tar.gz /tmp/sing-box.tar.gz
          tar -czf /tmp/text.tar.gz     -C release text
          tar -czf /tmp/mihomo.tar.gz   -C release mihomo
          tar -czf /tmp/sing-box.tar.gz -C release sing-box
          test -s /tmp/text.tar.gz
          test -s /tmp/mihomo.tar.gz
          test -s /tmp/sing-box.tar.gz
          sha256sum release/geoip.dat > release/geoip.dat.sha256

      - name: MASTER Push to release branch and update master
        if: github.ref_name == 'master'
        run: |
          cd release || exit 1
          git init
          git config --local user.name "hydraponique"
          git config --local user.email "hydraponique@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "Release ${{ env.DAILY_TAG }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release
          cd .. || exit 1
          git config --local user.name "hydraponique"
          git config --local user.email "hydraponique@users.noreply.github.com"
          git checkout master
          git add release/
          git commit -m "Release ${{ env.DAILY_TAG }}" || echo "No changes to commit"
          git push origin master

      - name: MASTER Publish GitHub Release
        if: github.ref_name == 'master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.DAILY_TAG }}
          name: ${{ env.DAILY_TAG }}
          prerelease: false
          draft: false
          files: |
            release/*.dat
            release/*.dat.sha256
            /tmp/mihomo.tar.gz
            /tmp/sing-box.tar.gz
            /tmp/text.tar.gz

      - name: MASTER Purge CDN for release and updated master branches
        if: github.ref_name == 'master'
        run: |
          set -euo pipefail
          cd release || exit 1
          find . -type f -not -path "./.git/*" -print0 | while IFS= read -r -d '' f; do
            rel="${f#./}"
            ${{ env.CURL }} -i "https://purge.jsdelivr.net/gh/${{ github.repository }}/release/${rel}"
            ${{ env.CURL }} -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@master/release/${rel}"
            ${{ env.CURL }} -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${rel}"
            ${{ env.CURL }} -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@${{ env.DAILY_TAG }}/release/${rel}"
          done

      - name: TEST Prepare release directory
        if: github.ref_name == 'test'
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release/text release/mihomo release/sing-box
          cp geoip/output/dat/*.dat release/
          cp -f /tmp/geoip-text/*.txt release/text/
          cp -a /tmp/mihomo/rulesets/.   release/mihomo/
          cp -a /tmp/sing-box/rulesets/. release/sing-box/
          sha256sum release/geoip.dat > release/geoip.dat.sha256

      - name: TEST Push to test-release branch & update test branch
        if: github.ref_name == 'test'
        run: |
          cd release || exit 1
          git init
          git config --local user.name "hydraponique"
          git config --local user.email "hydraponique@users.noreply.github.com"
          git checkout -b test-release
          git add -A
          git commit -m "Test Release $(date -u +%Y%m%d%H%M)"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin test-release
          cd .. || exit 1
          git config --local user.name "hydraponique"
          git config --local user.email "hydraponique@users.noreply.github.com"
          git checkout -B test
          git add release/
          git commit -m "Test Release $(date -u +%Y%m%d%H%M)" || echo "No changes to commit"
          git push origin test

      - name: TEST Purge CDN for test-release and updated test branches
        if: github.ref_name == 'test'
        run: |
          set -euo pipefail
          cd release || exit 1
          find . -type f -not -path "./.git/*" -print0 | while IFS= read -r -d '' f; do
            rel="${f#./}"
            ${{ env.CURL }} -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@test/release/${rel}"
            ${{ env.CURL }} -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@test-release/${rel}"
          done

      - name: Trigger routing update
        if: success() && github.ref_name == 'master'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_FOR_ROUTING }}
          repository: hydraponique/roscomvpn-routing
          event-type: update-routing-configs
          
